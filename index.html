<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--surface:#FFFFFF;--border:#E2E0D8;--text:#1A1917;--muted:#8A8880;
  --p1:#2D1B69;--p1bg:#EAE6FF;--p2:#0C3D6B;--p2bg:#E0EFFF;
  --p3:#1A4A1A;--p3bg:#E0F0E0;--p4:#4A4030;--p4bg:#F0EDE0;
  --danger:#8B2020;--dangerbg:#FFE8E8;--success:#1A4A1A;--successbg:#E0F0E0;
  --warn:#5C3A00;--warnbg:#FFF3D0;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--radius:8px;--radius-lg:14px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── PIN SCREEN ── */
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.pin-screen.hidden{display:none}
.pin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;width:340px;text-align:center}
.pin-logo{font-size:18px;font-weight:500;margin-bottom:4px}
.pin-logo span{color:var(--muted);font-weight:300}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.pin-roles{display:flex;flex-direction:column;gap:10px}
.pin-btn{padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;text-align:left}
.pin-btn:hover{border-color:#C8C6BE;background:var(--bg)}
.pin-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.pin-btn.primary:hover{background:#333}
.pin-btn.primary .pin-small{color:rgba(255,255,255,.55)}
.pin-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pin-icon.k{background:#EAE6FF}.pin-icon.c{background:#E0F0E0}
.pin-strong{display:block;font-size:13px;font-weight:500}
.pin-small{font-size:11px;color:var(--muted)}
.pin-input-wrap{margin-top:22px;text-align:left}
.pin-input-wrap label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.pin-input-wrap input{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:20px;font-family:var(--mono);letter-spacing:6px;text-align:center;background:var(--surface);color:var(--text)}
.pin-input-wrap input:focus{outline:none;border-color:#999}
.pin-error{font-size:12px;color:var(--danger);margin-top:6px;min-height:18px}
.pin-actions{display:flex;gap:8px;margin-top:14px}
.pin-actions button{flex:1;padding:9px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;font-family:var(--font);cursor:pointer;background:var(--surface)}
.pin-actions .confirm{background:var(--text);color:#fff;border-color:var(--text)}
.role-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}
.role-badge.kinesso{background:#EAE6FF;color:var(--p1)}
.role-badge.cuentas{background:#E0F0E0;color:var(--success)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;gap:0}
.logo{font-size:15px;font-weight:500;letter-spacing:-.3px;margin-right:28px;flex-shrink:0}
.logo span{color:var(--muted);font-weight:300}
.nav-tabs{display:flex;height:100%}
.nav-tab{padding:0 16px;font-size:13px;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;height:100%;transition:color .15s,border-color .15s;font-family:var(--font);white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}
.cap-pill{display:none;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--muted)}
.cap-pill.show{display:flex}
.cap-pill input{width:28px;border:none;background:none;font-size:12px;color:var(--text);text-align:center;font-family:var(--mono)}
.cap-pill input:focus{outline:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-ghost{border-color:transparent;background:none;color:var(--muted);font-size:12px}
.btn-ghost:hover{color:var(--text)}

main{padding:20px 24px;overflow:auto}
.view{display:none}.view.active{display:block}

/* ── CALENDAR ── */
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.month-btn:hover{background:var(--bg)}
.month-label{font-size:15px;font-weight:500;min-width:140px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--border);gap:1px}
.cal-head{background:var(--bg);padding:7px 8px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cal-cell{background:var(--surface);min-height:96px;padding:7px;transition:background .1s}
.cal-cell.other{background:#FAFAF8}.cal-cell.other .day-n{color:#D8D6CE}
.cal-cell.weekend{background:#FAFAF8}
.cal-cell.is-today .day-n{background:var(--text);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.day-n{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:3px}
.day-load{font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)}
.day-load.over{color:var(--danger)}
.chip{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;display:flex;align-items:center;gap:3px;line-height:1.4;cursor:default}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.chip-h{font-family:var(--mono);font-size:10px;opacity:.65;flex-shrink:0}
.chip-dl{font-size:10px;opacity:.7;flex-shrink:0}
.chip.p1{background:var(--p1bg);color:var(--p1)}.chip.p2{background:var(--p2bg);color:var(--p2)}
.chip.p3{background:var(--p3bg);color:var(--p3)}.chip.p4{background:var(--p4bg);color:var(--p4)}
.chip.has-deadline{border-left:2px solid #C17F24}
.chip.no-hours{opacity:.7;font-style:italic}
.more{font-size:10px;color:var(--muted);margin-top:1px}

/* ── QUEUE ── */
.queue-outer{display:flex;justify-content:center}
.queue-wrap{width:100%;max-width:660px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-head h2{font-size:15px;font-weight:500}
.task-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:grab;transition:all .15s;margin-bottom:5px}
.task-row:hover{border-color:#C8C6BE;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.task-row.drag-over{border-color:var(--text);border-style:dashed;background:var(--bg)}
.task-row.dragging{opacity:.3}
.task-row.done-row{opacity:.5}
.grip{color:#D8D6CE;font-size:16px;cursor:grab;line-height:1;user-select:none;flex-shrink:0}
.check-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.check-btn:hover{border-color:var(--success);background:var(--successbg)}
.task-name-col{flex:1;min-width:0}
.task-name-text{font-size:13px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-dl-text{font-size:11px;color:var(--warn);margin-top:1px}
.task-dl-text.overdue{color:var(--danger)}
.task-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.hours-tag{font-family:var(--mono);font-size:11px;color:var(--muted);padding:2px 6px;border-radius:4px;border:1px solid transparent;white-space:nowrap;transition:all .15s}
.hours-tag.editable{cursor:pointer}
.hours-tag.editable:hover{background:var(--bg);border-color:var(--border)}
.hours-tag.pending{color:var(--warn);font-family:var(--font);font-style:italic}
.hours-input{width:52px;font-family:var(--mono);font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 5px;text-align:center;background:var(--surface);color:var(--text)}
.hours-input:focus{outline:none;border-color:#999}
.del-btn{background:none;border:none;cursor:pointer;color:#D8D6CE;font-size:14px;padding:2px;line-height:1;transition:color .15s;flex-shrink:0}
.del-btn:hover{color:var(--danger)}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.prio-dot.p1{background:var(--p1)}.prio-dot.p2{background:var(--p2)}.prio-dot.p3{background:var(--p3)}.prio-dot.p4{background:var(--p4)}

/* ── HISTORY TAB ── */
.history-outer{display:flex;justify-content:center}
.history-wrap{width:100%;max-width:660px}
.history-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:center;gap:9px;margin-bottom:5px;opacity:.6}
.restore-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;padding:2px 8px;cursor:pointer;color:var(--muted);font-family:var(--font);transition:all .15s;flex-shrink:0}
.restore-btn:hover{color:var(--text);border-color:#C8C6BE}
.done-name{text-decoration:line-through;font-size:13px;flex:1;color:var(--muted)}
.done-date{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0}

/* ── PROJECTS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
.proj-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.proj-title{font-size:14px;font-weight:500;line-height:1.3}
.status-pill{font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.status-pill.active{background:var(--successbg);color:var(--success)}
.status-pill.pending{background:var(--warnbg);color:var(--warn)}
.status-pill.done{background:var(--bg);color:var(--muted)}
.proj-desc{font-size:12px;color:var(--muted);line-height:1.5}
.proj-meta{display:flex;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.deadline-near{color:var(--danger)!important}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,25,23,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:18px}
.fg{margin-bottom:13px}
.fg label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#999}
.fg-hint{font-size:11px;color:var(--muted);margin-top:3px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kinesso-section{background:var(--bg);border-radius:var(--radius);padding:10px 12px;margin-bottom:13px;border:1px dashed var(--border)}
.kinesso-label{font-size:10px;color:var(--p1);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transform:translateY(6px);transition:all .2s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:48px 0;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pin-screen">
  <div class="pin-card">
    <div class="pin-logo">Team<span>Planner</span></div>
    <div class="pin-sub">¿Con qué perfil accedes?</div>
    <div class="pin-roles" id="pin-roles">
      <button class="pin-btn primary" onclick="selectRole('kinesso')">
        <div class="pin-icon k">🎯</div>
        <div><strong class="pin-strong">Kinesso</strong><span class="pin-small"> Acceso completo · Requiere PIN</span></div>
      </button>
      <button class="pin-btn" onclick="selectRole('cuentas')">
        <div class="pin-icon c">📋</div>
        <div><strong class="pin-strong">Initiative / Cuentas</strong><span class="pin-small"> Añadir y ver tareas</span></div>
      </button>
    </div>
    <div id="pin-section" style="display:none">
      <div class="pin-input-wrap">
        <label>PIN Kinesso</label>
        <input type="password" id="pin-field" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')confirmPin()"/>
        <div class="pin-error" id="pin-error"></div>
      </div>
      <div class="pin-actions">
        <button onclick="backToRoles()">Volver</button>
        <button class="confirm" onclick="confirmPin()">Entrar</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
<header>
  <div class="logo">Team<span>Planner</span></div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('calendar',this)">Calendario</button>
    <button class="nav-tab" onclick="switchTab('queue',this)">Cola de tareas</button>
    <button class="nav-tab" onclick="switchTab('projects',this)">Proyectos</button>
    <button class="nav-tab" onclick="switchTab('history',this)">Historial</button>
  </nav>
  <div class="header-right">
    <span id="role-badge" class="role-badge"></span>
    <div class="cap-pill" id="cap-pill" title="Horas disponibles por día">
      ⏱ <input type="number" id="daily-cap" value="16" min="1" max="24" onchange="renderCalendar();renderQueue()"/> h/día
    </div>
    <button class="btn" onclick="openModal('task')">+ Tarea</button>
    <button class="btn btn-primary" onclick="openModal('project')">+ Proyecto</button>
    <button class="btn btn-ghost" onclick="logout()">Salir</button>
  </div>
</header>
<main>
  <div id="view-calendar" class="view active">
    <div class="cal-toolbar">
      <div class="month-nav">
        <button class="month-btn" onclick="prevMonth()">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="month-btn" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div id="view-queue" class="view">
    <div class="queue-outer"><div class="queue-wrap">
      <div class="sec-head"><h2>Cola de tareas</h2></div>
      <div id="queue-list"></div>
    </div></div>
  </div>

  <div id="view-projects" class="view">
    <div class="sec-head"><h2>Proyectos transversales</h2></div>
    <div class="proj-grid" id="proj-grid"></div>
  </div>

  <div id="view-history" class="view">
    <div class="history-outer"><div class="history-wrap">
      <div class="sec-head"><h2>Historial de completadas</h2></div>
      <div id="history-list"></div>
    </div></div>
  </div>
</main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://lifatkqvbeehphcftvax.supabase.co'
const SUPABASE_KEY = 'sb_publishable_z672kt4rhf9tMDnoYLKbAA_yN8b3wEG'
const KINESSO_PIN  = '4444' // ← cambia este PIN
// ══════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const DAYS   = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']

let today    = new Date(); today.setHours(0,0,0,0)
let curYear  = today.getFullYear()
let curMonth = today.getMonth()
let tasks    = [], projects = [], doneTasks = []
let modalType = 'task', dragIdx = null, currentRole = null

const isK = () => currentRole === 'kinesso'
function fmtKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function todayKey(){ return fmtKey(today) }

function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500)
}

// ── PIN ────────────────────────────────────────
function selectRole(r){
  if(r==='kinesso'){
    document.getElementById('pin-roles').style.display='none'
    document.getElementById('pin-section').style.display='block'
    setTimeout(()=>document.getElementById('pin-field').focus(),50)
  } else enterApp('cuentas')
}
function backToRoles(){
  document.getElementById('pin-roles').style.display='flex'
  document.getElementById('pin-section').style.display='none'
  document.getElementById('pin-field').value=''
  document.getElementById('pin-error').textContent=''
}
function confirmPin(){
  if(document.getElementById('pin-field').value===KINESSO_PIN) enterApp('kinesso')
  else{ document.getElementById('pin-error').textContent='PIN incorrecto'; document.getElementById('pin-field').value=''; document.getElementById('pin-field').focus() }
}
function enterApp(role){
  currentRole=role
  document.getElementById('pin-screen').classList.add('hidden')
  document.getElementById('app').style.display='grid'
  const b=document.getElementById('role-badge')
  b.textContent=role==='kinesso'?'Kinesso':'Initiative'
  b.className='role-badge '+(role==='kinesso'?'kinesso':'cuentas')
  if(isK()) document.getElementById('cap-pill').classList.add('show')
  init()
}
function logout(){
  currentRole=null; tasks=[]; projects=[]; doneTasks=[]
  document.getElementById('app').style.display='none'
  document.getElementById('pin-screen').classList.remove('hidden')
  document.getElementById('cap-pill').classList.remove('show')
  backToRoles()
}

// ── DATA ───────────────────────────────────────
async function loadTasks(){
  const {data}=await sb.from('tasks').select('*').eq('done',false).order('position')
  tasks=data||[]
}
async function loadDone(){
  const {data}=await sb.from('tasks').select('*').eq('done',true).order('done_at',{ascending:false})
  doneTasks=data||[]
}
async function loadProjects(){
  const {data}=await sb.from('projects').select('*').order('created_at')
  projects=data||[]
}

// ── ASSIGN DAYS ────────────────────────────────
function getWorkDaysFrom(fromDate, year, month){
  // Get all workdays from today onwards in this month, then next months
  const days=[]
  const start = new Date(Math.max(fromDate, new Date(year,month,1)))
  const end   = new Date(year,month+1,0)
  const cur   = new Date(start)
  while(cur<=end){ const d=cur.getDay(); if(d!==0&&d!==6) days.push(new Date(cur)); cur.setDate(cur.getDate()+1) }
  return days
}

function assignDays(){
  const cap=parseInt(document.getElementById('daily-cap').value)||16
  // Work days starting from today in current viewed month
  const workDays=getWorkDaysFrom(today, curYear, curMonth)
  // If today is beyond this month, show from 1st
  if(workDays.length===0){
    const tmp=new Date(curYear,curMonth,1)
    while(tmp.getMonth()===curMonth){ const d=tmp.getDay(); if(d!==0&&d!==6) workDays.push(new Date(tmp)); tmp.setDate(tmp.getDate()+1) }
  }

  const asgn={}; let dayIdx=0

  // Separate tasks with and without deadline
  const withDeadline = tasks.filter(t=>t.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline))
  const withoutDeadline = tasks.filter(t=>!t.deadline)
  const ordered = [...withDeadline, ...withoutDeadline]

  ordered.forEach(t=>{
    const h=t.hours||0
    if(h<=0){
      // No hours: place on today (or first workday of month)
      const key=fmtKey(workDays[0]||new Date(curYear,curMonth,1))
      if(!asgn[key]) asgn[key]={tasks:[],totalH:0}
      asgn[key].tasks.push({id:t.id,name:t.name,h:0,pending:true,deadline:t.deadline})
      return
    }
    // Has hours: fill days
    let rem=h
    let di=dayIdx
    while(rem>0&&di<workDays.length){
      const key=fmtKey(workDays[di])
      if(!asgn[key]) asgn[key]={tasks:[],totalH:0}
      const avail=cap-asgn[key].totalH
      if(avail<=0){di++;continue}
      const take=Math.min(rem,avail)
      const ex=asgn[key].tasks.find(x=>x.id===t.id)
      if(ex) ex.h+=take; else asgn[key].tasks.push({id:t.id,name:t.name,h:take,pending:false,deadline:t.deadline})
      asgn[key].totalH+=take; rem-=take
      if(asgn[key].totalH>=cap) di++
    }
    // advance shared dayIdx only for tasks without deadline
    if(!t.deadline) dayIdx=di
  })
  return {asgn,cap}
}

// ── CALENDAR ───────────────────────────────────
function renderCalendar(){
  document.getElementById('month-label').textContent=MONTHS[curMonth]+' '+curYear
  const {asgn,cap}=assignDays()
  const grid=document.getElementById('cal-grid'); grid.innerHTML=''
  DAYS.forEach(d=>{ const h=document.createElement('div');h.className='cal-head';h.textContent=d;grid.appendChild(h) })
  const first=new Date(curYear,curMonth,1)
  let sd=first.getDay(); if(sd===0) sd=7
  for(let i=1;i<sd;i++) grid.appendChild(makeCell(new Date(curYear,curMonth,1-sd+i),true,asgn,cap))
  const dim=new Date(curYear,curMonth+1,0).getDate()
  for(let d=1;d<=dim;d++) grid.appendChild(makeCell(new Date(curYear,curMonth,d),false,asgn,cap))
  const filled=grid.children.length-7; const rem=(7-(filled%7))%7
  for(let i=1;i<=rem;i++) grid.appendChild(makeCell(new Date(curYear,curMonth+1,i),true,asgn,cap))
}

function makeCell(dt,other,asgn,cap){
  const cell=document.createElement('div')
  const dow=dt.getDay(); const key=fmtKey(dt)
  cell.className='cal-cell'+(other?' other':'')+(dow===0||dow===6?' weekend':'')+(key===todayKey()?' is-today':'')
  const numDiv=document.createElement('div');numDiv.className='day-n';numDiv.textContent=dt.getDate();cell.appendChild(numDiv)
  if(!other&&dow!==0&&dow!==6){
    const d=asgn[key]
    if(d){
      if(isK()){
        const ld=document.createElement('div');ld.className='day-load'+(d.totalH>cap?' over':'')
        ld.textContent=Math.round(d.totalH)+'h / '+cap+'h'; cell.appendChild(ld)
      }
      d.tasks.slice(0,3).forEach(t=>{
        const chip=document.createElement('div')
        chip.className='chip p3'+(t.deadline?' has-deadline':'')+(t.pending?' no-hours':'')
        let right=''
        if(isK()) right=t.pending?'<span class="chip-h">?h</span>':(t.h?'<span class="chip-h">'+t.h+'h</span>':'')
        if(t.deadline) right+='<span class="chip-dl">📅</span>'
        chip.innerHTML='<span class="chip-name">'+t.name+'</span>'+right
        cell.appendChild(chip)
      })
      if(d.tasks.length>3){const m=document.createElement('div');m.className='more';m.textContent='+'+(d.tasks.length-3)+' más';cell.appendChild(m)}
    }
  }
  return cell
}

function prevMonth(){ curMonth--; if(curMonth<0){curMonth=11;curYear--}; renderCalendar() }
function nextMonth(){ curMonth++; if(curMonth>11){curMonth=0;curYear++}; renderCalendar() }

// ── QUEUE ──────────────────────────────────────
function renderQueue(){
  const cap=parseInt(document.getElementById('daily-cap').value)||16
  const {asgn}=assignDays()
  const taskDay={}
  Object.entries(asgn).forEach(([day,data])=>data.tasks.forEach(t=>{if(!taskDay[t.id])taskDay[t.id]=day}))
  const list=document.getElementById('queue-list'); list.innerHTML=''
  if(!tasks.length){list.innerHTML='<div class="empty">No hay tareas pendientes.</div>';return}

  tasks.forEach((t,idx)=>{
    const row=document.createElement('div'); row.className='task-row'; row.draggable=true; row.dataset.idx=idx
    row.addEventListener('dragstart',e=>{dragIdx=idx;e.currentTarget.classList.add('dragging')})
    row.addEventListener('dragend',e=>e.currentTarget.classList.remove('dragging'))
    row.addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.classList.add('drag-over')})
    row.addEventListener('dragleave',e=>e.currentTarget.classList.remove('drag-over'))
    row.addEventListener('drop',async e=>{
      e.preventDefault();e.currentTarget.classList.remove('drag-over')
      if(dragIdx===null||dragIdx===idx)return
      const moved=tasks.splice(dragIdx,1)[0];tasks.splice(idx,0,moved)
      dragIdx=null; await reorderTasks(); renderQueue(); renderCalendar()
    })

    const hasPending=!t.hours||t.hours===0
    const dayKey=taskDay[t.id]
    const dayStr=dayKey?(parseInt(dayKey.split('-')[2])+' '+MONTHS[parseInt(dayKey.split('-')[1])-1].slice(0,3)):'—'

    // Deadline display
    let dlHtml=''
    if(t.deadline){
      const dl=new Date(t.deadline); dl.setHours(0,0,0,0)
      const diff=Math.ceil((dl-today)/(1000*60*60*24))
      const cls=diff<0?'overdue':''
      const label=diff<0?'Vencida hace '+Math.abs(diff)+'d':diff===0?'Hoy':diff===1?'Mañana':'📅 '+dl.toLocaleDateString('es-ES',{day:'numeric',month:'short'})
      dlHtml='<div class="task-dl-text '+cls+'">'+label+'</div>'
    }

    // Hours (only kinesso sees)
    let hoursHtml=''
    if(isK()){
      hoursHtml=hasPending
        ?'<span class="hours-tag pending editable" onclick="editHours(event,\''+t.id+'\')">⏳ Definir horas</span>'
        :'<span class="hours-tag editable" onclick="editHours(event,\''+t.id+'\')" title="Click para editar">'+t.hours+'h</span>'
    }

    row.innerHTML=
      '<span class="grip">⠿</span>'+
      '<button class="check-btn" onclick="completeTask(\''+t.id+'\')" title="Marcar como hecha"></button>'+
      '<div class="task-name-col">'+
        '<span class="task-name-text">'+t.name+'</span>'+
        dlHtml+
      '</div>'+
      '<div class="task-right">'+
        hoursHtml+
        (isK()?'<span class="tag">📅 '+dayStr+'</span>':'')+
        (isK()?'<button class="del-btn" onclick="deleteTask(\''+t.id+'\')" title="Eliminar">✕</button>':'')+
      '</div>'
    list.appendChild(row)
  })
}

function editHours(e,taskId){
  e.stopPropagation()
  const span=e.currentTarget
  const task=tasks.find(t=>t.id===taskId); if(!task)return
  const input=document.createElement('input')
  input.type='number'; input.className='hours-input'
  input.value=task.hours||''; input.min='0.5'; input.step='0.5'; input.placeholder='h'
  span.replaceWith(input); input.focus(); input.select()
  const save=async()=>{
    const val=parseFloat(input.value)
    const newH=isNaN(val)||val<=0?null:val
    await sb.from('tasks').update({hours:newH}).eq('id',taskId)
    task.hours=newH; renderQueue(); renderCalendar()
    toast(newH?newH+'h guardadas ✓':'Sin horas — pendiente de definir')
  }
  input.addEventListener('blur',save)
  input.addEventListener('keydown',e2=>{if(e2.key==='Enter')save();if(e2.key==='Escape'){renderQueue();renderCalendar()}})
}

async function completeTask(id){
  const now=new Date().toISOString()
  await sb.from('tasks').update({done:true,done_at:now}).eq('id',id)
  const t=tasks.find(x=>x.id===id)
  if(t){t.done=true;t.done_at=now;doneTasks.unshift(t)}
  tasks=tasks.filter(x=>x.id!==id)
  renderQueue(); renderCalendar()
  toast('Tarea completada ✓')
}

async function reorderTasks(){
  await Promise.all(tasks.map((t,i)=>sb.from('tasks').update({position:i}).eq('id',t.id)))
}

async function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return
  await sb.from('tasks').delete().eq('id',id)
  tasks=tasks.filter(t=>t.id!==id); renderQueue(); renderCalendar()
  toast('Tarea eliminada')
}

// ── HISTORY ────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('history-list'); list.innerHTML=''
  if(!doneTasks.length){list.innerHTML='<div class="empty">Ninguna tarea completada todavía.</div>';return}
  doneTasks.forEach(t=>{
    const row=document.createElement('div'); row.className='history-row'
    const doneDate=t.done_at?new Date(t.done_at).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}):''
    row.innerHTML=
      '<span class="done-name">'+t.name+'</span>'+
      '<span class="done-date">'+doneDate+'</span>'+
      (isK()?'<button class="restore-btn" onclick="restoreTask(\''+t.id+'\')">Restaurar</button>':'')
    list.appendChild(row)
  })
}

async function restoreTask(id){
  await sb.from('tasks').update({done:false,done_at:null,position:tasks.length}).eq('id',id)
  const t=doneTasks.find(x=>x.id===id)
  if(t){t.done=false;tasks.push(t)}
  doneTasks=doneTasks.filter(x=>x.id!==id)
  renderHistory(); renderQueue(); renderCalendar()
  toast('Tarea restaurada')
}

// ── PROJECTS ───────────────────────────────────
function renderProjects(){
  const grid=document.getElementById('proj-grid'); grid.innerHTML=''
  if(!projects.length){grid.innerHTML='<div class="empty">No hay proyectos aún.</div>';return}
  const sl={active:'En curso',pending:'Pendiente',done:'Completado'}
  projects.forEach(p=>{
    const dl=p.deadline?new Date(p.deadline):null
    const daysLeft=dl?Math.ceil((dl-today)/(1000*60*60*24)):null
    const nc=daysLeft!==null&&daysLeft<14?' deadline-near':''
    const card=document.createElement('div'); card.className='proj-card'
    card.innerHTML=
      '<div class="proj-top"><div class="proj-title">'+p.name+'</div><span class="status-pill '+p.status+'">'+sl[p.status]+'</span></div>'+
      (p.description?'<div class="proj-desc">'+p.description+'</div>':'')+
      '<div class="proj-meta">'+
        (p.client?'<span>🏢 '+p.client+'</span>':'')+
        (dl?'<span class="'+nc+'">📅 '+dl.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+(daysLeft!==null?' · '+(daysLeft>0?daysLeft+'d':'vencido'):'')+'</span>':'')+
      '</div>'
    grid.appendChild(card)
  })
}

// ── MODAL ──────────────────────────────────────
function openModal(type){
  modalType=type
  document.getElementById('modal-title').textContent=type==='task'?'Nueva tarea':'Nuevo proyecto'
  const body=document.getElementById('modal-body')
  if(type==='task'){
    const kSection=isK()?
      '<div class="kinesso-section">'+
        '<div class="kinesso-label">🎯 Solo Kinesso</div>'+
        '<div class="fg" style="margin:0">'+
          '<label>Horas estimadas <span style="font-weight:300;text-transform:none">(opcional)</span></label>'+
          '<input id="f-hours" type="number" min="0.5" step="0.5" placeholder="Ej: 3"/>'+
          '<div class="fg-hint">Sin horas → aparece como pendiente de definir</div>'+
        '</div>'+
      '</div>'
      :'<input type="hidden" id="f-hours" value=""/>'
    body.innerHTML=
      '<div class="fg"><label>Nombre de la tarea *</label><input id="f-name" type="text" placeholder="Ej: Informe semanal cliente"/></div>'+
      '<div class="fg"><label>Deadline <span style="font-weight:300;text-transform:none">(opcional)</span></label>'+
        '<input id="f-deadline" type="date"/>'+
        '<div class="fg-hint">Sin deadline → se añade a la cola general</div>'+
      '</div>'+
      kSection
  } else {
    const defDate=new Date(curYear,curMonth+1,0).toISOString().slice(0,10)
    body.innerHTML=
      '<div class="fg"><label>Nombre del proyecto *</label><input id="f-name" type="text" placeholder="Ej: Lanzamiento Bing Ads UK"/></div>'+
      '<div class="fg"><label>Cliente / Cuenta</label><input id="f-client" type="text" placeholder="Ej: Massimo Dutti"/></div>'+
      '<div class="fg"><label>Descripción</label><textarea id="f-note" placeholder="Alcance o contexto..."></textarea></div>'+
      '<div class="fg-row">'+
        '<div class="fg"><label>Deadline</label><input id="f-deadline2" type="date" value="'+defDate+'"/></div>'+
        '<div class="fg"><label>Estado</label><select id="f-status"><option value="pending">Pendiente</option><option value="active">En curso</option><option value="done">Completado</option></select></div>'+
      '</div>'
  }
  document.getElementById('overlay').classList.add('open')
  setTimeout(()=>document.getElementById('f-name').focus(),50)
}

function closeModal(){document.getElementById('overlay').classList.remove('open')}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}

async function saveModal(){
  const name=document.getElementById('f-name').value.trim()
  if(!name){alert('El nombre es obligatorio');return}
  if(modalType==='task'){
    const hoursVal=parseFloat(document.getElementById('f-hours').value)
    const hours=isNaN(hoursVal)||hoursVal<=0?null:hoursVal
    const deadline=document.getElementById('f-deadline').value||null
    const {data,error}=await sb.from('tasks').insert({
      name,hours,deadline,done:false,position:tasks.length
    }).select().single()
    if(!error){tasks.push(data);renderQueue();renderCalendar();toast('Tarea añadida ✓')}
    else toast('Error: '+error.message)
  } else {
    const {data,error}=await sb.from('projects').insert({
      name,
      client:document.getElementById('f-client').value||null,
      description:document.getElementById('f-note').value||null,
      deadline:document.getElementById('f-deadline2').value||null,
      status:document.getElementById('f-status').value||'pending'
    }).select().single()
    if(!error){projects.push(data);renderProjects();toast('Proyecto añadido ✓')}
    else toast('Error: '+error.message)
  }
  closeModal()
}

// ── TABS ───────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
  btn.classList.add('active'); document.getElementById('view-'+tab).classList.add('active')
  if(tab==='queue'){renderQueue()}
  if(tab==='projects'){renderProjects()}
  if(tab==='history'){renderHistory()}
}

// ── INIT ───────────────────────────────────────
async function init(){
  document.getElementById('cal-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:13px">Cargando...</div>'
  await Promise.all([loadTasks(),loadDone(),loadProjects()])
  renderCalendar()
}
</script>
